<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reserva tu sesión — ETC. Equilibra Tu Camino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    a{text-decoration:none;color:inherit} button{cursor:pointer;border:none;background:none;font:inherit}
    :root{
      --teal:#2FA97F; --teal-d:#1F8C68; --ink:#1E211D; --muted:#6E7168; --subtle:#A1A399;
      --border:rgba(30,33,29,0.1); --bg:#F2F3F2; --paper:#fff;
      --mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100svh;
      background-image:radial-gradient(760px 460px at 8% -8%,rgba(47,169,127,0.08),transparent 60%);}
    .topnav{position:sticky;top:0;z-index:50;background:rgba(242,243,242,0.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(18px,4vw,36px)}
    .topnav img{height:22px;display:block}
    .topnav a.back{font-size:0.82rem;color:var(--muted);font-weight:500}
    .topnav a.back:hover{color:var(--teal-d)}
    .wrap{max-width:1080px;margin:0 auto;padding:clamp(26px,4vw,44px) clamp(14px,4vw,24px) 70px}
    .head{text-align:center;max-width:560px;margin:0 auto 26px}
    .head__eyebrow{font-family:var(--mono);font-size:0.64rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--teal-d);margin-bottom:10px}
    .head__h{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(1.6rem,3.2vw,2.3rem);line-height:1.12;letter-spacing:-0.025em;margin-bottom:12px}
    .head__h em{font-style:italic;color:var(--teal-d)}
    .head__p{color:var(--muted);font-size:0.95rem;line-height:1.6}
    .head__price{margin-top:14px;display:inline-block;font-size:0.84rem;color:var(--ink);background:var(--paper);border:1px solid var(--border);border-radius:999px;padding:8px 16px;box-shadow:0 2px 8px rgba(30,33,29,0.05)}
    .head__price strong{color:var(--teal-d)}
    .embed{background:var(--paper);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 16px 40px -26px rgba(30,33,29,0.2);position:relative}
    .embed iframe{display:block;width:100%;height:1180px;border:0;background:var(--paper)}
    .embed__bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);background:#FAFBFA;flex-wrap:wrap}
    .embed__bar span{font-size:0.78rem;color:var(--muted)}
    .embed__bar a{font-size:0.78rem;font-weight:600;color:var(--teal-d);display:inline-flex;align-items:center;gap:6px}
    .fallback{text-align:center;margin-top:18px;font-size:0.85rem;color:var(--muted)}
    .fallback a{color:var(--teal-d);font-weight:600}
    @media (max-width:600px){ .embed iframe{height:1320px} }
  </style>
</head>
<body>
<nav class="topnav">
  <a href="index.html" class="topnav__logo"><img src="images/logo-etc-transparent.webp" alt="ETC."></a>
  <a href="dashboard.html" class="back">← Volver al curso</a>
</nav>

<div class="wrap">
  <div class="head">
    <div class="head__eyebrow">Tu sesión</div>
    <h1 class="head__h">Reserva tu sesión con <em>Nacho o Marcos</em></h1>
    <p class="head__p">Elige el día y la hora que mejor te vengan. La reserva se gestiona de forma segura en la plataforma de ETC.</p>
    <div class="head__price" id="priceNote"></div>
  </div>

  <div class="embed">
    <div class="embed__bar">
      <span id="embedTag">Reserva segura · ETC.</span>
      <a id="resvOpen" href="https://etc-plataforma.vercel.app/leads" target="_blank" rel="noopener">Abrir en pantalla completa ↗</a>
    </div>
    <iframe id="resvFrame" src="https://etc-plataforma.vercel.app/leads" title="Reserva de sesión ETC" loading="eager" referrerpolicy="no-referrer-when-downgrade" allow="clipboard-write"></iframe>
  </div>

  <p class="fallback">¿No se carga el calendario? <a id="resvFallback" href="https://etc-plataforma.vercel.app/leads" target="_blank" rel="noopener">Ábrelo en una pestaña nueva →</a></p>
</div>

<script>
(function(){
  // Plan del alumno (lo fija la compra; aquí se lee de localStorage o ?plan=)
  const PLAN = new URLSearchParams(location.search).get('plan') || localStorage.getItem('etc_plan') || 'premium';

  // Calendario de reserva de ETC Plataforma.
  // ▶ Cuando Juan habilite el calendario DIRECTO sin formulario (pendiente #12)
  //   y el precio por plan, cambiar BASE a esa ruta. Los params ya van listos.
  const BASE = 'https://etc-plataforma.vercel.app/leads';
  const params = new URLSearchParams({
    origen: 'curso',
    plan: PLAN,                          // 'premium' | 'basic'
    precio: PLAN === 'premium' ? '0' : '65',  // premium incluida · básico 65€
  });
  const url = BASE + '?' + params.toString();

  document.getElementById('resvFrame').src = url;
  document.getElementById('resvOpen').href = url;
  document.getElementById('resvFallback').href = url;

  const note = document.getElementById('priceNote');
  if (PLAN === 'premium') {
    note.innerHTML = '<strong>Tu última sesión con Nacho está incluida</strong> en tu plan Premium · <strong>0€</strong>';
  } else {
    note.innerHTML = 'Sesión privada 1:1 · <strong>65€</strong>, se paga al reservar';
  }
})();
</script>
</body>
</html>
